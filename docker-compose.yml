services:
  mysql:
    image: mysql:8.4
    container_name: mh4u-api-mysql
    restart: unless-stopped
    ports:
      # Host 3307 -> container 3306 (3306 is already in use by another project)
      - "3307:3306"
    environment:
      MYSQL_DATABASE: mh4u_api
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: mh4u
      MYSQL_PASSWORD: secret
    volumes:
      - mh4u-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: mh4u-api-redis
    restart: unless-stopped
    ports:
      - "6380:6379"

volumes:
  mh4u-mysql-data:
