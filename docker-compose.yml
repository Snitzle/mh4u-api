services:
  # The API: Laravel 13 on PHP 8.4 served by Apache at http://localhost:8088,
  # backed by the mysql + redis services below.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mh4u-api
    restart: unless-stopped
    ports:
      - "8088:80"
    environment:
      APP_ENV: local
      APP_URL: http://localhost:8088
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: mh4u_api
      DB_USERNAME: mh4u
      DB_PASSWORD: secret
      CACHE_STORE: redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      # Bind-mount the repo so host edits are live and vendor/, .env persist.
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: mh4u-api-mysql
    restart: unless-stopped
    ports:
      # Host 3307 -> container 3306 (3306 is often taken by a local MySQL).
      - "3307:3306"
    environment:
      MYSQL_DATABASE: mh4u_api
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: mh4u
      MYSQL_PASSWORD: secret
    volumes:
      - mh4u-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: mh4u-api-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mh4u-mysql-data:
