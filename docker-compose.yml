services:
  # The API itself: Laravel 13 on PHP 8.4, serving the SQLite-backed data on
  # http://localhost:8088. This is the only service `docker compose up` starts.
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mh4u-api
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      # `php artisan serve` forwards only a whitelisted set of env vars to its
      # built-in server, so the entrypoint writes APP_URL into .env — that is
      # where the served app reads it, and where absolute icon_url / map_url get
      # their host:port. Change the port here and in `ports:` together.
      APP_URL: http://localhost:8088
    volumes:
      # Bind-mount the repo so edits on the host are picked up live, and so
      # vendor/, .env and the SQLite database persist outside the container.
      - .:/var/www/html
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@file_get_contents('http://127.0.0.1:8088/api/v1/monsters?lang=en') === false ? 1 : 0);"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s

  # Optional MySQL parity. Not started by default; opt in with:
  #   docker compose --profile mysql up -d
  # then point .env at DB_CONNECTION=mysql, DB_HOST=127.0.0.1, DB_PORT=3307.
  mysql:
    image: mysql:8.4
    container_name: mh4u-api-mysql
    profiles: ["mysql"]
    restart: unless-stopped
    ports:
      # Host 3307 -> container 3306 (3306 is already in use by another project)
      - "3307:3306"
    environment:
      MYSQL_DATABASE: mh4u_api
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: mh4u
      MYSQL_PASSWORD: secret
    volumes:
      - mh4u-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Optional Redis (cache/queue parity). Opt in with the `mysql` profile too.
  redis:
    image: redis:7-alpine
    container_name: mh4u-api-redis
    profiles: ["mysql"]
    restart: unless-stopped
    ports:
      - "6380:6379"

volumes:
  mh4u-mysql-data:
