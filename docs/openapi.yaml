openapi: 3.0.3
info:
  title: 'MH4U Database API'
  description: 'A public, read-only REST API for the Monster Hunter 4 Ultimate game database: monsters, weapons, armor, items, quests, locations, skills and more. Responses are cached and rate-limited; pass ?lang=de|fr|es|it|jp to localize names.'
  version: 1.0.0
servers:
  - url: 'http://localhost:8000'
    description: 'Local development server (php artisan serve)'
tags:
  - name: Armor
    description: "\nArmor pieces by slot, with defense, resistances and granted skills."
  - name: Decorations
    description: "\nDecorations (jewels) and the skills they grant."
  - name: 'Horn Melodies'
    description: "\nHunting Horn note-combination songs and their effects."
  - name: Items
    description: "\nEvery item: materials, consumables and the base records for equipment.\nItem detail includes where to get it and what it crafts into."
  - name: Locations
    description: "\nHunting locations, the monsters found there and gatherable items by rank."
  - name: Monsters
    description: "\nLarge and small monsters, their weakness/damage charts, habitats and drops."
  - name: Quests
    description: "\nCaravan, Guild and Event quests with their monsters, rewards and prerequisites."
  - name: Search
    description: ''
  - name: 'Skill Trees'
    description: "\nSkill trees, their skills by point threshold, and the items that grant them."
  - name: Weapons
    description: "\nAll 14 weapon types, their stats and upgrade trees."
  - name: Wyporium
    description: "\nWyporium item-for-item trades and the quests that unlock them."
paths:
  /api/v1/armor:
    get:
      summary: 'List armor.'
      operationId: listArmor
      description: ''
      parameters:
        -
          in: query
          name: per_page
          description: 'Must be at least 1.'
          example: 16
          required: false
          schema:
            type: integer
            description: 'Must be at least 1.'
            example: 16
        -
          in: query
          name: page
          description: 'Must be at least 1.'
          example: 22
          required: false
          schema:
            type: integer
            description: 'Must be at least 1.'
            example: 22
        -
          in: query
          name: sort
          description: 'Sort by defense or max_defense (prefix - to reverse).'
          example: '-defense'
          required: false
          schema:
            type: string
            description: 'Sort by defense or max_defense (prefix - to reverse).'
            example: '-defense'
        -
          in: query
          name: lang
          description: ''
          example: it
          required: false
          schema:
            type: string
            description: ''
            example: it
            enum:
              - en
              - de
              - fr
              - es
              - it
              - jp
        -
          in: query
          name: 'filter[slot]'
          description: 'Filter by slot: Head, Body, Arms, Waist, Legs.'
          example: Head
          required: false
          schema:
            type: string
            description: 'Filter by slot: Head, Body, Arms, Waist, Legs.'
            example: Head
        -
          in: query
          name: 'filter[rarity]'
          description: 'Filter by rarity (1-10).'
          example: 7
          required: false
          schema:
            type: integer
            description: 'Filter by rarity (1-10).'
            example: 7
        -
          in: query
          name: 'filter[skill]'
          description: 'Only armor granting this skill tree ID.'
          example: 12
          required: false
          schema:
            type: integer
            description: 'Only armor granting this skill tree ID.'
            example: 12
        -
          in: query
          name: 'filter[hunter_type]'
          description: 'Filter by hunter type: Blade, Gunner, Both.'
          example: Blade
          required: false
          schema:
            type: string
            description: 'Filter by hunter type: Blade, Gunner, Both.'
            example: Blade
